# Rugby Analytics — ClickHouse + Kafka + Superset + Prometheus + Grafana
# Запуск из каталога Project: docker compose up -d --build

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: rugby-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - rugby-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rugby-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - rugby-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: rugby-clickhouse
    hostname: clickhouse
    depends_on:
      - kafka
    ports:
      - "28123:8123"
      - "29000:9000"
      - "29363:9363"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d:ro
      - ./clickhouse/users.d/zzz-allow-docker.xml:/etc/clickhouse-server/users.d/zzz-allow-docker.xml:ro
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s
    networks:
      - rugby-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: rugby-prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - rugby-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: rugby-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - rugby-net

  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    container_name: rugby-superset
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "18088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-rugby-dev-change-me-in-production}
      SUPERSET_LOAD_EXAMPLES: "no"
    volumes:
      - superset_data:/app/superset_home
    networks:
      - rugby-net

networks:
  rugby-net:
    driver: bridge

volumes:
  clickhouse_data:
  prometheus_data:
  grafana_data:
  superset_data:
